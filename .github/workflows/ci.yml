name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check-types

      - name: Test
        run: bun test

      - name: Pack npm packages
        run: |
          (cd packages/tidegate-contracts && bun run build:pack)
          (cd packages/tidegate-sdk && bun run build:pack)
